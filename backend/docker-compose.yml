services:
  postgres:
    image: postgres:16-alpine
    container_name: cinerate-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: rate_movie_app
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: America/Sao_Paulo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rate_movie_app"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: backend-cinerate
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      TMDB_API_KEY: ${TMDB_API_KEY}
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/rate_movie_app
      TMDB_BASE_URL: https://api.themoviedb.org/3
      TMDB_IMAGE_BASE_URL: https://image.tmdb.org/t/p/w500
      TMDB_TIMEOUT_SECONDS: 10
      FLASK_DEBUG: "0"
      FLASK_RUN_HOST: 0.0.0.0
      FLASK_RUN_PORT: "5000"
      TZ: America/Sao_Paulo
    ports:
      - "5000:5000"

volumes:
  postgres_data: