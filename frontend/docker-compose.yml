version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # URL do backend embarcada no build do Vite
        VITE_API_BASE_URL: http://devcac:6011/api
    image: cinerate-frontend:latest
    container_name: cinerate-frontend
    ports:
      - "3000:80"
    restart: unless-stopped
    networks:
      - cinerate-network
    environment:
      # Variáveis de runtime (se necessário)
      - TZ=America/Sao_Paulo
    labels:
      - "com.cinerate.service=frontend"
      - "com.cinerate.description=Interface React do Cinerate"

networks:
  cinerate-network:
    driver: bridge
